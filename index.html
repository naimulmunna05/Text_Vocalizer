<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Vocalizer Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
</head>
<body>

    <div class="container">
        <h2>Text <span>Vocalizer</span></h2>
        
        <textarea id="text" placeholder="Type or paste your text here..."></textarea>
        
        <div class="settings-row">
            <div class="input-group">
                <label for="voices"> Select Voice  </label>
                <select id="voices"></select>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-speak" id="speakBtn"><i class="fas fa-play"></i> Play </button>
            <button class="btn-clear" id="clearBtn"><i class="fas fa-trash"></i> Reset </button>
        </div>

        <!-- Sound wave animation -->
        <div class="wave-container" id="waveContainer">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
